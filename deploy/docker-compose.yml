version: "3.8"

services:
  # ===== MySQL =====
  mysql:
    image: mysql:8.0
    container_name: fapai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: shanghai_fapai
      MYSQL_USER: fapai
      MYSQL_PASSWORD: ${DB_PASSWORD:-fapai123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===== FastAPI Backend =====
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: fapai-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: fapai
      DB_PASSWORD: ${DB_PASSWORD:-fapai123}
      DB_NAME: shanghai_fapai
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      APP_NAME: 法拍者联盟
      DEBUG: "false"
      IMAGE_STORAGE_PATH: /picture
      IMAGE_BASE_URL: ${IMAGE_BASE_URL:-}
    ports:
      - "25081:8000"
    volumes:
      - ./demo.db:/app/demo.db
      - /picture:/picture

  # ===== Vue Admin Panel =====
  admin:
    build:
      context: ../admin-web
      dockerfile: Dockerfile
    container_name: fapai-admin
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:80"

  # ===== Nginx =====
  nginx:
    image: nginx:alpine
    container_name: fapai-nginx
    restart: always
    depends_on:
      - backend
      - admin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - /picture:/picture:ro
      - nginx_logs:/var/log/nginx

volumes:
  mysql_data:
  nginx_logs:
