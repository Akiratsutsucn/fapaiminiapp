worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # ===== 通用 SSL 参数（两个 https server 共用） =====
    # 证书由 certbot 签发：certbot --nginx -d xcxapi.fapaizhelianmeng.cn -d admin.fapaizhelianmeng.cn
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ===== Port 80：仅用于 ACME 验证 + 强制跳转 HTTPS（不再代理任何业务） =====
    server {
        listen 80 default_server;
        server_name _;

        # certbot 续期用的 HTTP-01 验证路径，保留可被访问
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 其余所有请求 301 跳转到 https
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===== API Server — HTTPS 443 =====
    server {
        listen 443 ssl;
        http2 on;
        server_name xcxapi.fapaizhelianmeng.cn;

        ssl_certificate     /etc/letsencrypt/live/xcxapi.fapaizhelianmeng.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/xcxapi.fapaizhelianmeng.cn/privkey.pem;

        # 强制 HSTS：浏览器/客户端后续直接走 https
        add_header Strict-Transport-Security "max-age=31536000" always;

        # Static image files from COS mount /picture
        location /images/ {
            alias /picture/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Stricter rate limit for login endpoints
        location ~ ^/api/(v1/auth/login|admin/auth/login) {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://127.0.0.1:25081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # General API rate limit
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://127.0.0.1:25081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location / {
            proxy_pass http://127.0.0.1:25081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }

    # ===== Admin Panel — HTTPS 443 =====
    server {
        listen 443 ssl;
        http2 on;
        server_name admin.fapaizhelianmeng.cn;

        ssl_certificate     /etc/letsencrypt/live/xcxapi.fapaizhelianmeng.cn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/xcxapi.fapaizhelianmeng.cn/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000" always;

        root /usr/share/nginx/html/admin;
        index index.html;

        # API proxy to backend
        location /api/ {
            proxy_pass http://127.0.0.1:25081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Static assets cache
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}