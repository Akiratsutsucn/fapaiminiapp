worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # ===== Default server (IP access) - API + Admin =====
    server {
        listen 80 default_server;
        server_name _;

        # Static image files from COS mount /picture
        location /images/ {
            alias /picture/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Admin panel (path-based for IP testing)
        location /admin {
            alias /usr/share/nginx/html/admin;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
        }

        # Admin static assets
        location /assets/ {
            root /usr/share/nginx/html/admin;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Stricter rate limit for login endpoints
        location ~ ^/api/(v1/auth/login|admin/auth/login) {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://127.0.0.1:25081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # General API rate limit
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://127.0.0.1:25081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Everything else -> API
        location / {
            proxy_pass http://127.0.0.1:25081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }

    # ===== API Server (when DNS resolves) =====
    server {
        listen 80;
        server_name xcxapi.fapaizhelianmeng.cn;

        # Static image files from COS mount /picture
        location /images/ {
            alias /picture/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://127.0.0.1:25081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Stricter rate limit for login endpoints
        location ~ ^/api/(v1/auth/login|admin/auth/login) {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://127.0.0.1:25081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # General API rate limit
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://127.0.0.1:25081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ===== Admin Panel (when DNS resolves) =====
    server {
        listen 80;
        server_name admin.fapaizhelianmeng.cn;

        root /usr/share/nginx/html/admin;
        index index.html;

        # API proxy to backend
        location /api/ {
            proxy_pass http://127.0.0.1:25081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Static assets cache
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
